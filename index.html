<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tho Lo Nature - Cộng Đồng Bảo Mật</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f5f4; color: #1c1917; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        
        #login-overlay { position: fixed; inset: 0; background: rgba(28,25,23,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 25px; border-radius: 16px; max-width: 360px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.15); text-align: center; box-sizing: border-box; }
        
        .admin-credentials-box { background: #fafaf9; border: 1px solid #e7e5e4; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; box-sizing: border-box; }
        .btn-google { background: white; border: 1px solid #d6d3d1; color: #444; }
        .btn-primary { background: #059669; color: white; }
        .btn-primary:hover { background: #047857; }
        
        header { background: white; padding: 15px 20px; border-bottom: 1px solid #e7e5e4; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
        main { max-width: 700px; margin: 0 auto; padding: 20px; flex-grow: 1; width: 100%; box-sizing: border-box; }
        
        .upload-box { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e7e5e4; margin-bottom: 25px; }
        .input-text { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #d6d3d1; box-sizing: border-box; outline: none; font-size: 13px; }
        .input-text:focus { border-color: #059669; }
        
        .gallery { display: grid; grid-template-columns: 1fr; gap: 25px; }
        .card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e7e5e4; }
        .card img { width: 100%; height: auto; max-height: 400px; object-fit: cover; border-radius: 10px; margin-top: 10px; }
        
        .comment-section { background: #fafaf9; padding: 12px; border-radius: 10px; border: 1px solid #e7e5e4; margin-top: 15px; }
        .comment-tree { max-height: 250px; overflow-y: auto; }
        .comment-node { padding: 6px 10px; background: white; border: 1px solid #e7e5e4; border-radius: 8px; margin-top: 8px; font-size: 12px; }
        .reply-box { display: flex; gap: 5px; margin-top: 8px; }
        footer { background: #1c1917; color: #a8a29e; text-align: center; padding: 15px; font-size: 11px; margin-top: auto; }
    </style>
</head>
<body>

    <!-- GIAO DIỆN ĐĂNG NHẬP -->
    <div id="login-overlay">
        <div class="login-card">
            <div style="font-size: 35px; color: #059669; margin-bottom: 8px;"><i class="fa-solid fa-leaf"></i></div>
            <h2 style="margin: 0 0 5px 0; color: #1c1917; font-size: 22px;">Tho Lo Nature</h2>
            <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Điền tài khoản Admin của sếp để đăng nhập</p>
            
            <div class="admin-credentials-box">
                <label style="font-size: 11px; font-weight: bold; color: #444;">Email Quản Trị:</label>
                <input type="email" id="admin-email" placeholder="Nhập email của sếp..." class="input-text" style="margin-top: 4px; margin-bottom: 10px;">
                
                <label style="font-size: 11px; font-weight: bold; color: #444;">Mật khẩu:</label>
                <input type="password" id="admin-password" placeholder="Nhập mật khẩu..." class="input-text" style="margin-top: 4px; margin-bottom: 10px;">
                
                <button id="btn-admin-submit" class="btn btn-primary" style="margin-top: 5px;">Xác nhận Đăng nhập Admin</button>
            </div>

            <div style="margin: 20px 0 10px 0; border-top: 1px dashed #e7e5e4; padding-top: 12px; font-size: 11px; color: #666; font-weight: bold;">
                HOẶC DÙNG GOOGLE
            </div>
            <button id="btn-google-login" class="btn btn-google">
                <i class="fa-brands fa-google" style="color: #ea4335;"></i> Đăng nhập với Google
            </button>
        </div>
    </div>

    <!-- GIAO DIỆN CHÍNH HỆ THỐNG -->
    <div id="main-app" class="hidden">
        <header>
            <h3 style="margin:0; color:#059669; display: flex; align-items: center; gap: 6px;">
                <i class="fa-solid fa-leaf"></i> Tho Lo Nature
            </h3>
            <div style="display: flex; align-items: center; gap: 12px;">
                <img id="user-avatar" src="" style="width: 26px; height: 26px; border-radius: 50%; border: 1px solid #059669;">
                <span id="user-display-status" style="font-size: 12px; font-weight: bold; color: #444;"></span>
                <button id="btn-logout" style="color: #ef4444; background: none; border: none; cursor: pointer; font-size: 11px; font-weight: bold;">Đăng xuất</button>
            </div>
        </header>

        <main>
            <div class="upload-box">
                <h4 style="margin: 0 0 10px 0; font-size: 14px; color: #333;"><i class="fa-solid fa-camera" style="color: #059669;"></i> Chia sẻ khoảnh khắc thiên nhiên</h4>
                <input type="file" id="input-file" accept="image/*" class="input-text" style="padding: 6px;">
                <input type="text" id="input-caption" placeholder="Mô tả bức ảnh của bạn..." class="input-text">
                <button id="btn-upload" class="btn btn-primary" style="margin-top: 12px;">Đăng lên hệ thống</button>
            </div>

            <h4 style="border-bottom: 2px solid #059669; padding-bottom: 6px; margin: 25px 0 15px 0; color: #374151; font-size: 13px; text-transform: uppercase;">
                <i class="fa-solid fa-images"></i> Bài đăng mới nhất
            </h4>
            <div id="photo-gallery" class="gallery"></div>
        </main>

        <footer>
            <p style="margin: 0; color: #78716c; font-size: 10px;">Hệ thống bảo mật vận hành qua Supabase Cloud.</p>
        </footer>
    </div>

    <!-- SỬA LỖI: Nhúng thư viện Supabase CDN mới nhất, tương thích 100% mọi trình duyệt -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // KẾT NỐI SUPABASE CỦA SẾP
        const SUPABASE_URL = "https://vfuvjuztxwgsmrkojcfi.supabase.co";
        const SUPABASE_ANON_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmdXZqdXp0eHdnc21ya29qY2ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNTk0MjMsImV4cCI6MjA5ODgzNTQyM30.GLy0VACDl09VpM1IfE4ysYvtkXgef98jp5EhGArHNLk"; 
        
        const clientSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;

        async function checkUserSession() {
            try {
                const { data: { session } } = await clientSupabase.auth.getSession();
                if (session) {
                    currentUser = session.user;
                    showApp();
                } else { showLogin(); }
            } catch (e) { showLogin(); }
        }

        clientSupabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUser = session.user;
                showApp();
            } else {
                currentUser = null;
                showLogin();
            }
        });

        function showLogin() {
            document.getElementById('login-overlay').style.setProperty('display', 'flex', 'important');
            document.getElementById('main-app').classList.add('hidden');
        }

        function showApp() {
            if (!currentUser) return;
            document.getElementById('login-overlay').style.setProperty('display', 'none', 'important');
            document.getElementById('main-app').classList.remove('hidden');
            
            const fullName = (currentUser.user_metadata && currentUser.user_metadata.full_name) ? currentUser.user_metadata.full_name : currentUser.email;
            document.getElementById('user-display-status').innerText = fullName;
            document.getElementById('user-avatar').src = (currentUser.user_metadata && currentUser.user_metadata.avatar_url) ? currentUser.user_metadata.avatar_url : "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=80";
            
            loadPhotos();
        }

        // ĐĂNG NHẬP ADMIN TRỰC TIẾP
        document.getElementById('btn-admin-submit').onclick = async () => {
            const emailInput = document.getElementById('admin-email').value.trim();
            const passwordInput = document.getElementById('admin-password').value.trim();
            
            if(!emailInput || !passwordInput) {
                alert("Sếp điền nốt Email và Mật khẩu nhé!");
                return;
            }

            const btn = document.getElementById('btn-admin-submit');
            btn.innerText = "Đang kiểm tra...";
            btn.disabled = true;

            try {
                const { error } = await clientSupabase.auth.signInWithPassword({ 
                    email: emailInput, 
                    password: passwordInput 
                });
                if (error) {
                    alert("Đăng nhập thất bại: " + error.message);
                } else {
                    document.getElementById('admin-email').value = "";
                    document.getElementById('admin-password').value = "";
                }
            } catch (err) { alert("Lỗi kết nối: " + err.message); } 
            finally { btn.innerText = "Xác nhận Đăng nhập Admin"; btn.disabled = false; }
        };

        document.getElementById('btn-google-login').onclick = async () => {
            await clientSupabase.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { redirectTo: window.location.href } 
            });
        };

        document.getElementById('btn-logout').onclick = async () => {
            if(confirm("Sếp muốn đăng xuất?")) { await clientSupabase.auth.signOut(); }
        };

        document.getElementById('btn-upload').onclick = async () => {
            const fileInput = document.getElementById('input-file');
            const captionInput = document.getElementById('input-caption');
            if(fileInput.files.length === 0) { alert("Sếp chọn ảnh trước nhé!"); return; }
            if(!currentUser) return;

            const file = fileInput.files[0];
            const btn = document.getElementById('btn-upload');
            btn.innerText = "Đang tải..."; btn.disabled = true;

            try {
                const fileName = `${Date.now()}_${file.name}`;
                const { error: storageErr } = await clientSupabase.storage.from('nature-images').upload(fileName, file);
                if(storageErr) throw storageErr;

                const { data } = clientSupabase.storage.from('nature-images').getPublicUrl(fileName);
                const authorName = (currentUser.user_metadata && currentUser.user_metadata.full_name) ? currentUser.user_metadata.full_name : currentUser.email;

                await clientSupabase.from('photos').insert([{
                    url: data.publicUrl,
                    caption: captionInput.value.trim() || "Ảnh thiên nhiên.",
                    author: authorName
                }]);

                fileInput.value = ""; captionInput.value = "";
                alert("Tải lên thành công!");
                loadPhotos();
            } catch(err) { alert("Lỗi lưu trữ: " + err.message); } 
            finally { btn.innerText = "Đăng lên hệ thống"; btn.disabled = false; }
        };

        async function loadPhotos() {
            if(!currentUser) return;
            try {
                const { data: photos, error } = await clientSupabase.from('photos').select('*').order('id', { ascending: false });
                if (error) throw error;
                
                const gallery = document.getElementById('photo-gallery');
                if(!photos || photos.length === 0) {
                    gallery.innerHTML = `<p style="color:#78716c; text-align:center; font-size:12px; padding:20px;">Chưa có bài đăng nào.</p>`;
                    return;
                }
                const currentAuthor = (currentUser.user_metadata && currentUser.user_metadata.full_name) ? currentUser.user_metadata.full_name : currentUser.email;

                gallery.innerHTML = photos.map(p => {
                    const isAdmin = (currentUser.email === "tholo.nature@gmail.com" || currentAuthor === "Tho Lo");
                    const deleteBtnHtml = isAdmin ? `<button onclick="deletePhoto(${p.id})" style="color:#ef4444; background:none; border:none; cursor:pointer; font-size:11px;">Xóa</button>` : '';

                    return `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-size:11px; font-weight:bold; color:#059669;"><i class="fa-solid fa-user"></i> ${p.author || 'Thành viên'}</span>
                                ${deleteBtnHtml}
                            </div>
                            <img src="${p.url}">
                            <p style="font-size:13px; margin:10px 0; color:#1c1917;">${p.caption}</p>
                            <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f5f5f4; padding-top:8px;">
                                <button onclick="likePhoto(${p.id}, ${p.likes || 0})" style="color:#f43f5e; background:none; border:none; font-size:12px; cursor:pointer;">
                                    <i class="fa-solid fa-heart"></i> (<span id="like-count-${p.id}">${p.likes || 0}</span>)
                                </button>
                                <button onclick="downloadImage('${p.url}', ${p.id})" style="color:#059669; background:none; border:none; font-size:12px; cursor:pointer;">
                                    <i class="fa-solid fa-download"></i> Tải ảnh
                                </button>
                            </div>
                            <div class="comment-section">
                                <div id="comments-tree-${p.id}" class="comment-tree"></div>
                                <div style="display:flex; gap:6px; margin-top:8px;">
                                    <input type="text" id="root-cmt-${p.id}" placeholder="Bình luận..." style="flex:1; padding:5px; font-size:11px; border:1px solid #d6d3d1; border-radius:6px;">
                                    <button onclick="addComment(${p.id}, null)" style="background:#059669; color:white; border:none; padding:4px 8px; font-size:11px; border-radius:6px; cursor:pointer;">Gửi</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                photos.forEach(p => fetchCommentsTree(p.id));
            } catch (err) { console.error("Lỗi nạp ảnh:", err); }
        }

        async function fetchCommentsTree(photoId) {
            if(!currentUser) return;
            try {
                const treeContainer = document.getElementById(`comments-tree-${photoId}`);
                const { data: cmts, error } = await clientSupabase.from('comments').select('*').eq('photo_id', photoId).order('id', { ascending: true });
                if (error) throw error;
                if(!cmts || cmts.length === 0) { treeContainer.innerHTML = ""; return; }

                const roots = cmts.filter(c => !c.parent_id);
                const currentAuthor = (currentUser.user_metadata && currentUser.user_metadata.full_name) ? currentUser.user_metadata.full_name : currentUser.email;

                function generateNodeHtml(comment, level = 0) {
                    const childs = cmts.filter(c => c.parent_id === comment.id);
                    const isOwner = (comment.user_token === currentUser.id || currentAuthor === "Tho Lo" || currentUser.email === "tholo.nature@gmail.com");
                    const deleteCmtBtn = isOwner ? `<button onclick="deleteCmt(${comment.id}, ${photoId})" style="color:#b45309; background:none; border:none; font-size:10px; cursor:pointer;">Xóa</button>` : '';

                    let html = `
                        <div style="margin-left: ${level * 12}px; border-left: ${level > 0 ? '1px dashed #cbd5e1' : 'none'}; padding-left: 6px">
                            <div class="comment-node">
                                <div style="display:flex; justify-content:space-between; font-weight:bold; color:#1e3a8a; font-size:11px;">
                                    <span>${comment.author}</span> ${deleteCmtBtn}
                                </div>
                                <p style="margin:4px 0; color:#374151;">${comment.text}</p>
                                <span onclick="toggleReplyInput(${comment.id})" style="color:#059669; font-size:10px; cursor:pointer; text-decoration:underline;">Trả lời</span>
                                <div id="reply-box-${comment.id}" class="hidden reply-box">
                                    <input type="text" id="reply-input-${comment.id}" placeholder="Phản hồi..." style="flex:1; padding:3px; font-size:10px; border:1px solid #cbd5e1; border-radius:4px;">
                                    <button onclick="addComment(${photoId}, ${comment.id})" style="background:#1c1917; color:white; border:none; padding:2px 6px; font-size:10px; border-radius:4px;">Gửi</button>
                                </div>
                            </div>
                        </div>
                    `;
                    childs.forEach(child => { html += generateNodeHtml(child, level + 1); });
                    return html;
                }
                treeContainer.innerHTML = roots.map(c => generateNodeHtml(c, 0)).join('');
            } catch (err) { console.error(err); }
        }

        window.toggleReplyInput = (id) => {
            const box = document.getElementById(`reply-box-${id}`);
            if(box) box.classList.toggle('hidden');
        };

        window.addComment = async (photoId, parentId) => {
            if(!currentUser) return;
            const inputElement = parentId ? document.getElementById(`reply-input-${parentId}`) : document.getElementById(`root-cmt-${photoId}`);
            const commentText = inputElement.value.trim();
            if(!commentText) return;
            const authorName = (currentUser.user_metadata && currentUser.user_metadata.full_name) ? currentUser.user_metadata.full_name : currentUser.email;

            await clientSupabase.from('comments').insert([{
                photo_id: photoId, parent_id: parentId, author: authorName, text: commentText, user_token: currentUser.id
            }]);
            inputElement.value = "";
            fetchCommentsTree(photoId);
        };

        window.deleteCmt = async (id, photoId) => {
            if(confirm("Xóa bình luận này?")) {
                await clientSupabase.from('comments').delete().eq('id', id);
                fetchCommentsTree(photoId);
            }
        };

        window.likePhoto = async (id, currentLikes) => {
            const label = document.getElementById(`like-count-${id}`);
            const updatedLikes
